<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FamilyFinance v2.1.0</title>
<meta name="theme-color" content="#e07b39"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="FamilyFinance"/>
<script>window.tailwind={config:{darkMode:'class'}}</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
*{-webkit-tap-highlight-color:transparent !important;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;overscroll-behavior:none;background:#fdf6f0}
.dark body{background:#111318}
.page{min-height:calc(100dvh - 4.5rem);padding-bottom:5.5rem}
.card{background:#fff;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);padding:1rem}
.dark .card{background:#1e2130}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;font-weight:700;border-radius:14px;cursor:pointer;border:none;font-family:inherit;touch-action:manipulation;position:relative;overflow:hidden;transition:all 120ms ease;-webkit-transform:translateZ(0);transform:translateZ(0);}
.btn:active{transform:scale(0.91);opacity:0.78}
.field{width:100%;border:2px solid #e8ddd5;border-radius:14px;padding:.7rem 1rem;background:#fff;color:#1a1a2e;font-family:inherit;font-size:.875rem;outline:none;transition:border .15s}
.dark .field{background:#252836;border-color:#353a50;color:#e8e4dc}
.dark .field:focus{border-color:#e07b39}
.progress-wrap{height:8px;border-radius:6px;background:#f0e8e0;overflow:hidden}
.dark .progress-wrap{background:#2d2d3d}
.progress-bar{height:100%;border-radius:6px;transition:width .5s cubic-bezier(0.4,0,0.2,1)}
</style>
</head>
<body class="text-gray-900 dark:text-gray-100 select-none">

<div id="APP" class="max-w-md mx-auto relative">

<!-- ===== SPLASH ===== -->
<div id="SCR_LOADING" class="fixed inset-0 flex flex-col items-center justify-center z-50" style="background:linear-gradient(145deg,#e07b39,#c4622a)">
  <div class="text-6xl mb-3">💰</div>
  <h1 class="text-white text-2xl font-extrabold">FamilyFinance</h1>
  <p class="text-orange-100 text-sm mt-1">v2.1.0 — IA Mejorada</p>
  <div class="spinner mt-6" style="border:3px solid rgba(255,255,255,.25);border-top-color:white;width:28px;height:28px;border-radius:50%;animation:spin 0.75s linear infinite"></div>
</div>

<!-- ===== AUTH ===== -->
<div id="SCR_AUTH" class="hidden min-h-dvh flex flex-col bg-orange-50 dark:bg-gray-900">
  <!-- ... (el formulario de login/register se mantiene igual que en tu versión original) ... -->
  <!-- Por brevedad lo omito aquí, pero puedes copiarlo del archivo original si lo necesitas completo. -->
  <!-- Si quieres la versión 100% completa con auth, avísame y te la expando. -->
</div>

<!-- ===== MAIN APP ===== -->
<div id="SCR_APP" class="hidden">

  <!-- Top Bar -->
  <div class="sticky top-0 z-40 bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 p-2.5">
    <div class="flex items-center justify-between">
      <div onclick="nav('settings')" class="flex items-center gap-2 cursor-pointer">
        <div id="TB_avatar" class="w-9 h-9 rounded-2xl flex items-center justify-center text-white font-extrabold text-sm" style="background:linear-gradient(135deg,#e07b39,#c4622a)">U</div>
        <div>
          <p id="TB_name" class="font-bold text-sm">Usuario</p>
          <p id="TB_family" class="text-xs text-gray-400">Familia</p>
        </div>
      </div>
      <button onclick="runAdvisor()" class="btn btn-primary btn-sm">🤖 Analizar IA</button>
    </div>
  </div>

  <!-- Pages -->
  <div id="PAGES">

    <!-- DASHBOARD -->
    <div id="PG_dashboard" class="page px-4 pt-4 space-y-4">
      <h2 id="MONTH_LABEL" class="font-extrabold text-lg text-center"></h2>
      <!-- Resumen cards -->
      <div class="grid grid-cols-2 gap-3">
        <div class="rounded-2xl p-4 text-white col-span-2" style="background:linear-gradient(135deg,#e07b39,#c4622a)">
          <p class="text-orange-100 text-xs">Balance disponible</p>
          <p id="D_balance" class="text-3xl font-extrabold">$0</p>
        </div>
        <div class="rounded-2xl p-3 text-white" style="background:linear-gradient(135deg,#10b981,#065f46)">
          <p class="text-green-100 text-xs">Ingresos</p>
          <p id="D_income" class="text-xl font-extrabold">$0</p>
        </div>
        <div class="rounded-2xl p-3 text-white" style="background:linear-gradient(135deg,#ef4444,#b91c1c)">
          <p class="text-red-100 text-xs">Gastos</p>
          <p id="D_expense" class="text-xl font-extrabold">$0</p>
        </div>
      </div>

      <!-- Asesor IA - Sección destacada -->
      <div class="card">
        <div class="flex justify-between items-center mb-3">
          <p class="font-bold text-sm">🤖 Asesor IA Financiera</p>
          <button onclick="runAdvisor()" class="btn btn-primary btn-sm">Analizar ahora</button>
        </div>
        <div class="rounded-3xl p-5 text-white" style="background:linear-gradient(135deg,#e07b39,#c4622a)">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-orange-100 text-sm">Salud Financiera</p>
              <p id="ADV_score" class="text-5xl font-extrabold">—</p>
            </div>
            <svg width="88" height="88" viewBox="0 0 88 88">
              <circle cx="44" cy="44" r="36" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="7"/>
              <circle id="ADV_ring" cx="44" cy="44" r="36" fill="none" stroke="white" stroke-width="7" stroke-dasharray="226" stroke-dashoffset="226" transform="rotate(-90 44 44)" style="transition:stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1)"/>
            </svg>
          </div>
          <p id="ADV_label" class="text-orange-200 text-sm mt-2">Presiona Analizar</p>
        </div>
        <div id="ADV_stats" class="grid grid-cols-3 gap-2 mt-3 hidden">
          <div class="card text-center p-2"><p class="text-xs text-gray-400">Ahorro</p><p id="ADV_saverate" class="font-extrabold text-green-500">0%</p></div>
          <div class="card text-center p-2"><p class="text-xs text-gray-400">Deuda/Ing</p><p id="ADV_debtratio" class="font-extrabold text-purple-500">0%</p></div>
          <div class="card text-center p-2"><p class="text-xs text-gray-400">Cuotas/Ing</p><p id="ADV_instratio" class="font-extrabold text-yellow-500">0%</p></div>
        </div>
        <div id="ADV_results" class="space-y-3 mt-4"></div>
      </div>
    </div>

    <!-- Otras páginas (expenses, cards, budget, settings) se mantienen igual que en tu versión original -->
    <!-- Puedes copiarlas desde tu archivo anterior si las necesitas completas -->

  </div>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white dark:bg-gray-900 border-t border-gray-100 dark:border-gray-800 z-40 p-2">
    <div class="flex justify-around">
      <button onclick="nav('dashboard')" class="nav-btn active">🏠 <span class="text-xs">Inicio</span></button>
      <button onclick="nav('advisor')" class="nav-btn">🤖 <span class="text-xs">IA</span></button>
      <!-- Agrega más botones según necesites -->
    </div>
  </nav>
</div>

<script>
// =============================================================
// FAMILYFINANCE v2.1.0 — IA Financiera Mejorada
// =============================================================
'use strict';

let S = {
  user: null,
  family: null,
  members: [],
  expenses: [],
  cards: [],
  budgets: [],
  goals: [],
  alerts: [],
  month: new Date(),
  editExpId: null,
  editCardId: null
};

let currentPage = 'dashboard';
let charts = {};

// Formato ARS
const fmtARS = (n) => {
  if (n == null || isNaN(n)) return '$0';
  const abs = Math.abs(n);
  let str = abs >= 1_000_000 ? (abs/1_000_000).toFixed(1)+'M' : 
            abs >= 1000 ? Math.round(abs/1000)+'K' : 
            Math.round(abs).toLocaleString('es-AR');
  return n < 0 ? '-'+str : '$'+str;
};

const sameMonth = (ds, d) => {
  try {
    const x = new Date(ds + 'T00:00:00');
    return x.getMonth() === d.getMonth() && x.getFullYear() === d.getFullYear();
  } catch { return false; }
};

const monthStr = (d = new Date()) => {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2, '0');
};

// ==================== ASESOR IA MEJORADO (v2.1) ====================
function runAdvisor() {
  const mo = S.month;
  const monthExp = S.expenses.filter(e => sameMonth(e.date, mo));
  const income = S.user?.salary || 0;
  const infl = (S.user?.inflationRate || 24) / 100;   // Inflación proyectada 2026
  const totalExp = monthExp.reduce((s, e) => s + (e.amount || 0), 0);
  const balance = income - totalExp;
  const savRate = income > 0 ? balance / income : 0;

  const totalDebt = (S.cards || []).reduce((s, c) => s + (c.balance || 0), 0);
  const debtRatio = income > 0 ? totalDebt / income : 0;

  const minPayTotal = (S.cards || []).reduce((s, c) => s + (c.minPay || 0), 0);
  const minPayRatio = income > 0 ? minPayTotal / income : 0;

  const activeInst = S.expenses.filter(e => e.installments > 1 && (e.curInst || 1) < e.installments);
  const instRemainder = activeInst.reduce((s, e) => s + e.amount * (e.installments - (e.curInst || 1)), 0);
  const instRatio = income > 0 ? instRemainder / income : 0;

  // Scoring mejorado
  let score = 100;
  if (savRate < 0) score -= 35;
  else if (savRate < 0.05) score -= 25;
  else if (savRate < 0.15) score -= 12;
  else if (savRate >= 0.25) score += 8;

  if (debtRatio > 4) score -= 28;
  else if (debtRatio > 2.5) score -= 18;
  else if (debtRatio > 1) score -= 8;

  if (minPayRatio > 0.35) score -= 22;
  else if (minPayRatio > 0.20) score -= 12;

  if (infl > 0.20) score -= 10;

  const overBudgets = S.budgets.filter(b => {
    if (b.month !== monthStr(mo)) return false;
    const spent = S.expenses.filter(e => e.cat === b.cat && sameMonth(e.date, mo))
      .reduce((s, e) => s + (e.amount || 0), 0);
    return spent > b.amount * 1.1;
  }).length;
  score -= overBudgets * 6;

  score = Math.max(0, Math.min(100, Math.round(score)));

  // Actualizar UI
  document.getElementById('ADV_score').textContent = score;
  document.getElementById('ADV_ring').style.strokeDashoffset = 226 * (1 - score / 100);

  const scoreLabels = {
    85: { t: '🌟 Excelente — Finanzas sólidas', c: '#10b981' },
    70: { t: '😊 Bueno — En buen camino', c: '#22c55e' },
    55: { t: '🙂 Regular — Hay margen de mejora', c: '#f59e0b' },
    40: { t: '😐 Débil — Atención requerida', c: '#f97316' },
    0:  { t: '😰 Crítico — Acción urgente', c: '#ef4444' }
  };
  const lbl = Object.entries(scoreLabels).sort((a,b) => b[0]-a[0]).find(([k]) => score >= +k)[1];
  document.getElementById('ADV_label').textContent = lbl.t;
  document.getElementById('ADV_label').style.color = lbl.c;

  // Stats
  document.getElementById('ADV_saverate').textContent = Math.round(savRate*100) + '%';
  document.getElementById('ADV_debtratio').textContent = Math.round(debtRatio*100) + '%';
  document.getElementById('ADV_instratio').textContent = Math.round(instRatio*100) + '%';
  document.getElementById('ADV_stats').classList.remove('hidden');

  // Recomendaciones inteligentes
  const recs = [];

  if (balance < 0) {
    recs.push({icon:'🚨', color:'#ef4444', title:'Déficit mensual', text:`Estás gastando ${fmtARS(Math.abs(balance))} más de lo que ingresas. Con inflación actual (\~24%), esto es insostenible.`});
  } else if (savRate < 0.15) {
    recs.push({icon:'⚠️', color:'#f59e0b', title:`Ahorro bajo (${Math.round(savRate*100)}%)`, text:'Apuntá al menos al 20%. Automatizá una transferencia fija el día de cobro.'});
  }

  if (debtRatio > 2) {
    const worst = S.cards.length ? S.cards.reduce((w,c) => (c.intRate||0) > (w.intRate||0) ? c : w) : null;
    recs.push({icon:'🚨', color:'#ef4444', title:'Deuda alta — Avalancha', text:`Deuda total \( {fmtARS(totalDebt)}. Priorizá pagar la tarjeta con mayor interés ( \){worst ? worst.name : ''}).`});
  }

  if (activeInst.length > 3) {
    recs.push({icon:'📦', color:'#f59e0b', title:`${activeInst.length} cuotas activas`, text:`Comprometés ${fmtARS(instRemainder)} futuros. Reduce nuevas cuotas.`});
  }

  const efTarget = (totalExp || income * 0.8) * 6;
  if (!S.goals.some(g => /emergencia|emergency/i.test(g.name))) {
    recs.push({icon:'🛡️', color:'#14b8a6', title:'Fondo de emergencia', text:`Construí 6 meses de gastos (\~${fmtARS(efTarget)}). Prioridad #1.`});
  }

  if (savRate > 0.05 && balance > 0) {
    recs.push({icon:'💰', color:'#6366f1', title:'Inversiones recomendadas 2026', text:`• Plazo Fijo UVA (inflación + renta)\n• FCI Money Market (alta liquidez)\n• Instrumentos CER/UVA para proteger tu capital.`});
  }

  recs.sort((a,b) => (a.priority||2) - (b.priority||2));

  document.getElementById('ADV_results').innerHTML = recs.map(r => `
    <div class="card border-l-4" style="border-color:${r.color}">
      <div class="flex gap-3">
        <span class="text-2xl">${r.icon}</span>
        <div>
          <p class="font-bold">${r.title}</p>
          <p class="text-sm text-gray-600 dark:text-gray-400 whitespace-pre-line">${r.text}</p>
        </div>
      </div>
    </div>
  `).join('');
}

// Navegación básica
function nav(page) {
  currentPage = page;
  document.querySelectorAll('#PAGES > div').forEach(div => div.classList.add('hidden'));
  const active = document.getElementById('PG_' + page);
  if (active) active.classList.remove('hidden');
}

// Inicialización
function init() {
  // Datos de ejemplo para probar
  S.user = { salary: 850000, inflationRate: 24 };
  S.expenses = [
    {date: '2026-04-05', amount: 120000, cat: 'supermercado'},
    {date: '2026-04-10', amount: 85000, cat: 'alquiler'},
    {date: '2026-04-15', amount: 45000, cat: 'transporte'}
  ];
  S.cards = [{name: 'Visa Galicia', balance: 280000, intRate: 8.5}];

  nav('dashboard');
  runAdvisor();   // Análisis automático al cargar
}

document.addEventListener('DOMContentLoaded', init);
</script>

</div>
</body>
